  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans Thai", "Microsoft YaHei", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .panel {
      width: 100%;
      max-width: 760px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 30px;
    }

    .meta {
      margin: 0 0 16px;
      color: #667085;
      line-height: 1.6;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #cfd4dc;
      border-radius: 6px;
      font-size: 17px;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.6;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 1px solid #cfd4dc;
      border-radius: 6px;
      background: white;
      color: #1f2937;
      cursor: pointer;
      font-size: 17px;
      min-height: 48px;
      padding: 12px 14px;
      text-align: left;
    }

    button:hover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .primary {
      margin-top: 20px;
      width: 100%;
      text-align: center;
      font-weight: 700;
      color: white;
      border-color: #2563eb;
      background: #2563eb;
    }

    .primary:hover {
      background: #1d4ed8;
      color: white;
    }

    .question {
      font-size: 22px;
      line-height: 1.5;
      margin: 16px 0;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: #667085;
      font-weight: 700;
    }

    .timer {
      color: #b42318;
    }

    .result {
      white-space: pre-line;
      font-size: 18px;
      line-height: 1.8;
    }

    .error {
      margin-top: 10px;
      color: #b42318;
      min-height: 22px;
    }

    .study-box {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #f8fafc;
      line-height: 1.8;
      white-space: pre-line;
    }

    @media (max-width: 560px) {
      .page {
        align-items: stretch;
        padding: 0;
      }

      .panel {
        min-height: 100vh;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 22px 16px;
      }

      h1 {
        font-size: 26px;
      }

      .question {
        font-size: 20px;
      }

      button {
        width: 100%;
        font-size: 16px;
      }
    }
  </style>
</head>

        "L4": "重点练高级表达：阅读新闻、访谈和说明文，训练抽象词、复杂句和正式表达。"
      };
      return suggestions[level] + " 当前可重点关注：" + weakText + "。";
    }

    function getDailyWordPlan(level) {
      const plans = {
        "L0": "每天 20 个字母/拼读项：先认辅音 ก ข ค ง จ，再加入元音 า ิ ี ุ ู，最后练简单音节。",
        "L1": "每天 20 个基础常用词，例如旅行、家庭、日常动作类泰语词。",
        "L2": "每天 20 个中级核心词，例如常见句型、时间副词和连接词。",
        "L3": "每天 20 个进阶词，例如抽象名词、社会生活和表达观点的词。",
        "L4": "每天 20 个高级词，例如新闻、商务、学术和复杂语境词。"
      };
      return plans[level];
    }

    function getTodayKey() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function getStorageKey() {
      return "wordPlans:" + userName.toLowerCase();
    }

    function loadWordPlans() {
      const saved = localStorage.getItem(getStorageKey());

      if (!saved) {
        return [];
      }

      try {
        return JSON.parse(saved);
      } catch (error) {
        return [];
      }
    }

    function saveWordPlans(plans) {
      localStorage.setItem(getStorageKey(), JSON.stringify(plans));
    }

    function daysBetween(startDate, endDate) {
      const start = new Date(startDate + "T00:00:00");
      const end = new Date(endDate + "T00:00:00");
      return Math.round((end - start) / 86400000);
    }

    function getDueReviewWords() {
      const today = getTodayKey();
      const plans = loadWordPlans();
      let reviewWords = [];

      for (const plan of plans) {
        const dayGap = daysBetween(plan.date, today);

        if (reviewDays.includes(dayGap)) {
          reviewWords = reviewWords.concat(plan.words);
        }
      }

      return reviewWords;
    }

    function getSystemWords(level) {
      return systemWordBanks[level].slice(0, dailyNewWordCount);
    }

    function formatWords(words) {
      if (words.length === 0) {
        return "暂无需要复习的旧内容。";
      }

      return words.join("、");
    }

    function saveTodayWords(words, source) {
      const today = getTodayKey();
      const plans = loadWordPlans().filter(plan => plan.date !== today);
      plans.push({
        date: today,
        level: lastLevel,
        source: source,
        words: words
      });
      saveWordPlans(plans);
      showWordPlanPage("今日学习项已保存。明天打开本页面时，会提醒你复习今天的 20 个内容。");
    }

    function useSystemWords() {
      saveTodayWords(getSystemWords(lastLevel), "系统推荐");
    }

    function useCustomWords() {
      const input = document.getElementById("customWords");
      const errorText = document.getElementById("wordError");
      const words = input.value
        .split(/[\s,，、]+/)
        .map(word => word.trim())
        .filter(word => word.length > 0)
        .slice(0, dailyNewWordCount);

      if (words.length === 0) {
        errorText.textContent = "请至少输入 1 个学习内容。";
        return;
      }

      saveTodayWords(words, "自己设置");
    }

    function showWordPlanPage(message = "") {
      const reviewWords = getDueReviewWords();
      const systemWords = getSystemWords(lastLevel);
      const messageHtml = message ? `<div class="study-box">${message}</div>` : "";

      app.innerHTML = `
        <h1>今日泰语学习计划</h1>
        <p class="meta">根据你的等级 ${getLevelTitle(lastLevel)}，每天学习 ${dailyNewWordCount} 个内容。L0 从字母和拼读开始，后续等级再逐步进入词汇、句型和语境。</p>
        <div class="study-box">今日需要复习的旧内容：
${formatWords(reviewWords)}

艾宾浩斯复习节奏：
第 2 天、第 3 天、第 5 天、第 8 天、第 16 天、第 31 天复习之前学过的内容。</div>
        <label>选择今天的新学习内容来源：</label>
        <div class="options">
          <button onclick="useSystemWords()">A. 使用系统推荐：${systemWords.join("、")}</button>
          <button onclick="document.getElementById('customArea').style.display = 'block'">B. 自己设置学习内容</button>
        </div>
        <div id="customArea" style="display:none">
          <label for="customWords">请输入今天要学的内容，最多 20 个：</label>
          <textarea id="customWords" placeholder="例如：ก&#10;า&#10;มา"></textarea>
          <button class="primary" onclick="useCustomWords()">保存自己设置的内容</button>
          <div class="error" id="wordError"></div>
        </div>
        ${messageHtml}
        <button class="primary" onclick="showStartPage()">返回测试</button>
      `;
    }

    function showResultPage() {
      const accuracy = correctCount / activeQuestions.length * 100;
      const averageTime = answerTimes.reduce((a, b) => a + b, 0) / answerTimes.length;
      const level = getLevel(accuracy);
      const weakTypes = getWeakTypes();
      const weakText = weakTypes.length > 0 ? weakTypes.join("、") : "暂无";
      const suggestion = getSuggestion(level, weakTypes);
      const dailyWordPlan = getDailyWordPlan(level);
      const levelTitle = getLevelTitle(level);
      lastLevel = level;

      app.innerHTML = `
        <h1>测试结果</h1>
        <div class="result">泰语名字：${userName}
性别：${gender}
用户等级：${levelTitle}
正确率：${accuracy.toFixed(1)}%
平均答题时间：${averageTime.toFixed(1)} 秒
薄弱题型：${weakText}
每日学习计划：${dailyWordPlan}

按等级推荐：
${suggestion}</div>
        <button class="primary" onclick="showWordPlanPage()">生成今日泰语学习计划</button>
        <button class="primary" onclick="showStartPage()">重新测试</button>
      `;
    }

    showAccessPage();
  </script>
</body>
</html>
