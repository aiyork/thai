<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>泰语水平测试</title>
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans Thai", "Microsoft YaHei", sans-serif;
      background: #f6f7fb;
      color: #1f2937;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }

    .panel {
      width: 100%;
      max-width: 760px;
      background: white;
      padding: 22px 16px 28px;
      overflow-wrap: anywhere;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 26px;
      line-height: 1.35;
    }

    .study-title {
      margin: -8px 0 18px;
      font-size: 34px;
      font-weight: 700;
      line-height: 1.35;
    }

    .meta {
      margin: 0 0 16px;
      color: #667085;
      line-height: 1.6;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #cfd4dc;
      border-radius: 6px;
      font-size: 17px;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.6;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      width: 100%;
      border: 1px solid #cfd4dc;
      border-radius: 6px;
      background: white;
      color: #1f2937;
      cursor: pointer;
      font-size: 16px;
      line-height: 1.5;
      min-height: 52px;
      padding: 13px 14px;
      text-align: left;
      overflow-wrap: anywhere;
    }

    button:hover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .primary {
      margin-top: 20px;
      width: 100%;
      text-align: center;
      font-weight: 700;
      color: white;
      border-color: #2563eb;
      background: #2563eb;
    }

    .primary:hover {
      background: #1d4ed8;
      color: white;
    }

    .question {
      font-size: 22px;
      line-height: 1.5;
      margin: 16px 0;
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 14px;
      color: #667085;
      font-weight: 700;
    }

    .timer {
      color: #b42318;
    }

    .result {
      white-space: pre-line;
      padding: 16px;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #f8fafc;
      font-size: 17px;
      line-height: 1.8;
      overflow-wrap: anywhere;
    }

    .error {
      margin-top: 10px;
      color: #b42318;
      min-height: 22px;
    }

    .study-box {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #f8fafc;
      line-height: 1.8;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    .sentence-box {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #f8fafc;
      line-height: 1.8;
    }

    .sentence-label {
      margin-bottom: 6px;
      font-weight: 700;
    }

    .thai-sentence {
      font-size: 22px;
      line-height: 1.8;
      overflow-wrap: anywhere;
    }

    .lookup-token {
      display: inline;
      width: auto;
      min-height: 0;
      padding: 0 2px;
      border: none;
      border-radius: 3px;
      color: #1d4ed8;
      background: transparent;
      font-size: inherit;
      font-weight: 700;
      line-height: inherit;
      text-align: left;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .lookup-token:hover {
      border: none;
      background: #dbeafe;
    }

    .lookup-card {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #93c5fd;
      border-radius: 8px;
      background: #eff6ff;
      line-height: 1.8;
      overflow-wrap: anywhere;
    }

    .lookup-card .primary {
      margin-top: 12px;
    }

    .thai-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .thai-actions button {
      flex: 1 1 140px;
      min-height: 48px;
      text-align: center;
    }

    .action-message {
      margin-top: 8px;
      min-height: 24px;
      color: #475467;
    }

    @media (min-width: 561px) {
      .page {
        align-items: center;
        padding: 24px;
      }

      .panel {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        font-size: 30px;
      }

      .study-title {
        font-size: 38px;
      }

      .question {
        font-size: 22px;
      }

      button {
        font-size: 17px;
      }

      .result {
        padding: 18px;
        font-size: 18px;
      }
    }

    @media (min-width: 1024px) {
      .page {
        padding: 36px;
      }

      .panel {
        padding: 32px;
      }
    }
  </style>
</head>

    <section class="panel" id="app"></section>

    function chooseRandomQuestion(pool, usedQuestionTexts) {
      // 从当前难度位的 20 道候选题里随机抽 1 道，并尽量避免重复题目。
      const availableQuestions = pool.filter(question => !usedQuestionTexts.has(question.question));
      const source = availableQuestions.length > 0 ? availableQuestions : pool;
      const randomIndex = Math.floor(Math.random() * source.length);
      const question = source[randomIndex];
      usedQuestionTexts.add(question.question);
      return question;
    }

    function buildTestQuestions() {
      // 每个题库池抽一道题，组成一次完整的 20 题测试。
      const usedQuestionTexts = new Set();

      return questionPools.map(pool => chooseRandomQuestion(pool, usedQuestionTexts));
    }

      const saved = loadCurrentViewState();

      if (!saved || !saved.currentView) {
        showStartPage();
        return;
      }

      userName = saved.userName || "";
      gender = saved.gender || "";
      studiedThai = saved.studiedThai ?? null;
      lastLevel = saved.lastLevel || "";

      if (saved.currentView === "learning" && lastLevel) {
        activeLearningItems = Array.isArray(saved.learningQueue) && saved.learningQueue.length > 0
          ? saved.learningQueue
          : await loadRecommendedLearningItems(lastLevel);

        if (activeLearningItems.length === 0) {
          showWordPlanPage();
          return;
        }

        currentLearningIndex = Math.min(
          Math.max(Number(saved.currentLearningIndex) || 0, 0),
          activeLearningItems.length - 1
        );
        await ensureDailyDictionary();
        showLearningItemPage();
        return;
      }

      if (saved.currentView === "wordDetail" && saved.bookId && saved.wordId) {
        await showBookWordsPage(saved.bookId, { restoreWordId: saved.wordId });
        return;
      }

      if (saved.currentView === "bookWords" && saved.bookId) {
        await showBookWordsPage(saved.bookId);
        return;
      }

      if (saved.currentView === "wordBooks") {
        await showWordBooksPage();
        return;
      }

        showWordPlanPage();
        return;
      }

      showStartPage();

    async function registerAccount() {
      const form = getLoginForm();
      const client = getAuthClient();

      if (!form) {
        return;
      }

      if (!client) {
        form.accessError.textContent = "数据库还没配置，暂时不能注册。";
        return;
      }

      form.accessError.textContent = "正在发送验证邮件...";
      const { error } = await client.auth.signUp({
        email: form.email,
        password: form.password,
        options: {
          emailRedirectTo: getRedirectUrl()
        }
      });

      if (error) {
        form.accessError.textContent = error.message;
        return;
      }

      form.accessError.textContent = "验证邮件已发送。请打开邮箱点击验证链接，然后回到这里登录。";
    }

    async function checkLogin() {
      const form = getLoginForm();
      const client = getAuthClient();

      if (!form) {
        return;
      }

      if (!client) {
        if (enableDemoLogin && form.email === demoEmail && form.password === demoPassword) {
          accessGranted = true;
          loginEmail = demoEmail;
          currentUserId = "demo-user";
          rememberDemoAccess();
          showStartPage();
          return;
        }

        form.accessError.textContent = "数据库还没配置，暂时不能登录。";
        return;
      }

      form.accessError.textContent = "正在登录...";
      const { data, error } = await client.auth.signInWithPassword({
        email: form.email,
        password: form.password
      });

      if (error) {
        if (enableDemoLogin && form.email === demoEmail && form.password === demoPassword) {
          accessGranted = true;
          loginEmail = demoEmail;
          currentUserId = "demo-user";
          rememberDemoAccess();
          showStartPage();
          return;
        }

        form.accessError.textContent = error.message;
        return;
      }

      if (!data.user.email_confirmed_at) {
        form.accessError.textContent = "邮箱还没有验证，请先点击邮箱里的验证链接。";
        return;
      }

      accessGranted = true;
      loginEmail = data.user.email;
      currentUserId = data.user.id;
      rememberDemoAccess();
      showStartPage();
    }

    async function restoreLoginSession() {
      const client = getAuthClient();

      if (!client) {
        showAccessPage();
        return;
      }

      const { data } = await client.auth.getSession();

      if (data.session && data.session.user && data.session.user.email_confirmed_at) {
        accessGranted = true;
        loginEmail = data.session.user.email;
        currentUserId = data.session.user.id;

        return;

      if (

        return;
      }

    }

    function updateTimer() {
      remainingSeconds -= 1;

        submitAnswer(null);

    function stopTimer() {
      if (timerId !== null) {
        clearInterval(timerId);

    function submitAnswer(userAnswer) {
      stopTimer();
      const question = activeQuestions[currentIndex];
      let spentTime = (Date.now() - questionStartTime) / 1000;

      // 超时自动提交时，答题耗时最多记为本题时间上限。
      if (spentTime > currentTimeLimit) {
        spentTime = currentTimeLimit;
      }

      answerTimes.push(spentTime);

      if (userAnswer === question.answer) {
        correctCount += 1;
      } else {
        if (!wrongTypeCounts[question.type]) {
          wrongTypeCounts[question.type] = 0;
        }
        wrongTypeCounts[question.type] += 1;
      }

      currentIndex += 1;

      if (currentIndex < activeQuestions.length) {
        showQuestionPage();
      } else {
        showResultPage();
      }
    }

    function getLevel(accuracy) {
      // 这里只按正确率分级；如果以后想加入答题速度，可以在这里扩展。
      if (accuracy < 30) return "L0";
      if (accuracy < 50) return "L1";
      if (accuracy < 70) return "L2";
      if (accuracy < 85) return "L3";
      return "L4";
    }

    function getLevelTitle(level) {

        "L2": "L2：常用句型和基础语法",
        "L3": "L3：语境理解和短文阅读",
        "L4": "L4：高级表达和复杂语境"
      };
      return titles[level];
    }

    function getWeakTypes() {
      const entries = Object.entries(wrongTypeCounts);
      if (entries.length === 0) return [];

      let maxWrong = Math.max(...entries.map(item => item[1]));
      return entries.filter(item => item[1] === maxWrong).map(item => item[0]);
    }

    function getSuggestion(level, weakTypes) {
      const weakText = weakTypes.length > 0 ? weakTypes.join("、") : "暂无明显薄弱题型";

        "L4": "重点练高级表达：阅读新闻、访谈和说明文，训练抽象词、复杂句和正式表达。"
      };
      return suggestions[level] + " 当前可重点关注：" + weakText + "。";

    function daysBetween(startDate, endDate) {
      const start = new Date(startDate + "T00:00:00");
      const end = new Date(endDate + "T00:00:00");
      return Math.round((end - start) / 86400000);
    }

    function getDueReviewWords() {
      const today = getTodayKey();
      const plans = loadWordPlans();
      let reviewWords = [];

      for (const plan of plans) {
        const dayGap = daysBetween(plan.date, today);

        if (reviewDays.includes(dayGap)) {
          reviewWords = reviewWords.concat(plan.words);
        }
      }

      return reviewWords;
    }

    function getSystemWords(level) {
      return systemWordBanks[level].slice(0, dailyNewWordCount);
    }

    function formatWords(words) {
      if (words.length === 0) {
        return "暂无需要复习的旧内容。";
      }

      return words.join("、");
    }

    function saveTodayWords(words, source, options = {}) {
      const today = getTodayKey();
      const plans = loadWordPlans().filter(plan => plan.date !== today);
      plans.push({
        date: today,
        level: lastLevel,
        source: source,
        words: words
      });
      saveWordPlans(plans);

      if (!options.skipMessage) {
        showWordPlanPage("今日学习项已保存。明天打开本页面时，会提醒你复习今天的 20 个内容。");
      }
    }

    async function loadRecommendedLearningItems(level) {
      const client = getAuthClient();

      if (!client) {
        throw new Error("Supabase 还没有配置，暂时不能读取推荐学习内容。");
      }

      const { data, error } = await client
        .from("thai_words")
        .select("id, thai_text, chinese_meaning, pronunciation, example_thai, example_chinese, track, level, category, part_of_speech, audio_url, sort_order")
        .eq("track", "daily")
        .eq("level", level)
        .eq("is_active", true)
        .order("category", { ascending: true })
        .order("sort_order", { ascending: true })
        .limit(dailyNewWordCount);

      if (error) {
        throw error;
      }

      return data || [];
    }

    async function ensureDailyDictionary() {
      if (dailyDictionaryWords.length > 0) {
        return;
      }

      const client = getAuthClient();

      if (!client) {
        throw new Error("Supabase 还没有配置，暂时不能读取泰语词典。");
      }

      const { data, error } = await client
        .from("thai_words")
        .select("id, thai_text, chinese_meaning, track, level, category, part_of_speech, audio_url")
        .eq("track", "daily")
        .eq("is_active", true)
        .limit(1000);

      if (error) {
        throw error;
      }

      dailyDictionaryWords = data || [];
      dailyDictionaryByTerm = new Map();

      for (const word of dailyDictionaryWords) {
        const thaiText = String(word.thai_text || "").trim();

        if (thaiText) {
          dailyDictionaryByTerm.set(thaiText, { ...word, lookup_text: thaiText });
        }

        if (word.level === "L0" && word.category === "letters") {
          const [, ...representativeParts] = thaiText.split(/\s+/);
          const representativeWord = representativeParts.join(" ");

          if (representativeWord) {
            dailyDictionaryByTerm.set(
              representativeWord,
              { ...word, lookup_text: representativeWord }
            );
          }
        }
      }

      dailyDictionaryTerms = [...dailyDictionaryByTerm.keys()]
        .filter(term => term.length > 0)
        .sort((left, right) => right.length - left.length || left.localeCompare(right));
    }

    async function useSystemWords() {
      const errorText = document.getElementById("wordPlanError");

      if (errorText) {
        errorText.textContent = "正在读取系统推荐学习内容...";
      }

      try {
        const [items] = await Promise.all([
          loadRecommendedLearningItems(lastLevel),
          ensureDailyDictionary()
        ]);

        if (items.length === 0) {
          throw new Error("没有找到当前等级的推荐学习内容。");
        }

        saveTodayWords(items.map(item => item.thai_text), "系统推荐", { skipMessage: true });
        startLearningSession(items);
      } catch (error) {
        if (errorText) {
          errorText.textContent = "读取系统推荐失败：" + error.message;

    function showAudioMessage(message, messageBoxId = "audioMessage") {
      const messageBox = document.getElementById(messageBoxId);

    }

    function speakThaiText(thaiText, messageBoxId = "audioMessage") {
      if (!("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)) {
        showAudioMessage("暂无音频", messageBoxId);
        return;
      }

      const utterance = new SpeechSynthesisUtterance(thaiText);
      utterance.lang = "th-TH";
      const thaiVoice = window.speechSynthesis
        .getVoices()
        .find(voice => voice.lang && voice.lang.toLowerCase().startsWith("th"));

      if (thaiVoice) {
        utterance.voice = thaiVoice;
      }

      utterance.onerror = () => {
        showAudioMessage("暂无音频", messageBoxId);
      };
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
      showAudioMessage("正在播放泰语发音", messageBoxId);
    }

    function playAudio(audioUrl, thaiText, messageBoxId = "audioMessage") {
      // 优先播放数据库里的公开 MP3；MP3 为空或播放失败时，用浏览器泰语 TTS。
      if (!audioUrl) {
        speakThaiText(thaiText, messageBoxId);
        return;
      }

      const audio = new Audio(audioUrl);
      audio.play().catch(() => {
        speakThaiText(thaiText, messageBoxId);
      });
    }

    async function copyThaiText(thaiText, messageBoxId) {
      const copyWithTextarea = () => {
        const textarea = document.createElement("textarea");
        textarea.value = thaiText;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        const copied = document.execCommand("copy");
        textarea.remove();

        if (!copied) {
          throw new Error("copy failed");
        }
      };

      try {
        if (navigator.clipboard && window.isSecureContext) {
          try {
            await navigator.clipboard.writeText(thaiText);
          } catch (error) {
            copyWithTextarea();
          }
        } else {
          copyWithTextarea();
        }

        showAudioMessage("已复制", messageBoxId);
      } catch (error) {
        showAudioMessage("复制失败，请手动复制", messageBoxId);
      }
    }

    function renderThaiActions(thaiText, audioUrl, messageBoxId) {
      return `

          <button data-audio-url="${escapeHtml(audioUrl || "")}" data-thai-text="${escapeHtml(thaiText)}" onclick="playAudio(this.dataset.audioUrl, this.dataset.thaiText, '${messageBoxId}')">🔊 发音</button>

    }

    function renderClickableThaiSentence(thaiSentence) {
      const sentence = String(thaiSentence || "");
      let output = "";
      let position = 0;

      while (position < sentence.length) {
        const term = dailyDictionaryTerms.find(candidate =>
          sentence.startsWith(candidate, position)
        );

        if (!term) {
          output += escapeHtml(sentence[position]);
          position += 1;
          continue;
        }

        output += `<button class="lookup-token" data-lookup-term="${escapeHtml(term)}" onclick="showThaiWordLookup(this.dataset.lookupTerm)">${escapeHtml(term)}</button>`;
        position += term.length;
      }

      return output;
    }

    async function saveWordProgress(word, resultType) {
      const client = getAuthClient();

      if (!client || !currentUserId) {
        throw new Error("请先登录。");
      }

      if (currentUserId === "demo-user") {
        return;
      }

      const { data: existing, error: readError } = await client
        .from("user_word_progress")
        .select("review_count, wrong_count, correct_streak")
        .eq("user_id", currentUserId)
        .eq("word_id", word.id)
        .maybeSingle();

      if (readError) {
        throw readError;
      }

      const reviewCount = existing?.review_count || 0;
      const wrongCount = existing?.wrong_count || 0;
      const correctStreak = existing?.correct_streak || 0;
      const now = new Date().toISOString();
      const progress = {
        user_id: currentUserId,
        word_id: word.id,
        last_studied_at: now,
        updated_at: now
      };

      if (resultType === "wrong") {
        Object.assign(progress, {
          status: "learning",
          mastery_level: 0,
          review_count: reviewCount + 1,
          wrong_count: wrongCount + 1,
          correct_streak: 0,
          last_result: "wrong",
          next_review_at: getTomorrowIsoString()
        });
      } else {
        Object.assign(progress, {
          status: "mastered",
          mastery_level: 5,
          review_count: reviewCount + 1,
          wrong_count: wrongCount,
          correct_streak: correctStreak + 1,
          last_result: "mastered",
          next_review_at: null
        });
      }

      const { error } = await client
        .from("user_word_progress")
        .upsert(progress, { onConflict: "user_id,word_id" });

      if (error) {
        throw error;
      }
    }

      const word = activeLearningItems[currentLearningIndex];

      if (!word) {
        showLearningCompletePage();

      if (errorText) {
        errorText.textContent = "";

      try {
        await saveWordProgress(word, resultType);
        moveToNextLearningItem();

        if (errorText) {
          errorText.textContent = "保存学习进度失败：" + error.message;
        }
        console.warn("保存学习进度失败：", error.message);
      }
    }

    function showLearningItemPage() {
      const word = activeLearningItems[currentLearningIndex];

      if (!word) {
        showLearningCompletePage();
        return;
      }

      saveCurrentViewState("learning", {
        learningQueue: activeLearningItems,
        currentLearningIndex
      });

      app.innerHTML = `
        <div class="topline">
          <div>今日学习：${currentLearningIndex + 1} / ${activeLearningItems.length}</div>
          <div>${escapeHtml(getDisplayName(word.category))}</div>
        </div>
        <h1>${escapeHtml(getWordCardTitle(word))}</h1>
        <div class="study-title">${escapeHtml(word.thai_text)}</div>
        ${renderThaiActions(word.thai_text, word.audio_url || "", "wordActionMessage")}
        <div class="result">${renderWordCardDetails(word)}</div>
        ${renderExampleSentenceHtml(word)}
        <div class="options">
          <button onclick="moveToNextLearningItem()">下一个</button>
          <button onclick="markLearningItem('wrong')">不认识，加入复习</button>
          <button onclick="markLearningItem('mastered')">斩：已记住，不用再背</button>
        </div>
        <div class="error" id="learningError"></div>
        <button class="primary" onclick="showWordPlanPage()">返回学习计划</button>
      `;
    }

    function showLearningCompletePage() {
      clearCurrentViewState();
      app.innerHTML = `
        <h1>今日学习完成</h1>
        <div class="study-box">你已经完成今天的系统推荐学习。明天可以继续复习和学习新的内容。</div>
        <button class="primary" onclick="showWordPlanPage()">返回学习计划</button>
        <button class="primary" onclick="showStartPage()">返回测试首页</button>
      `;
    }

    function showWordPlanPage(message = "") {
      const reviewWords = getDueReviewWords();
      const systemWords = getSystemWords(lastLevel);
      const messageHtml = message ? `<div class="study-box">${message}</div>` : "";

      saveCurrentViewState("wordPlan");
      app.innerHTML = `
        <h1>今日泰语学习计划</h1>
        <p class="meta">根据你的等级 ${getLevelTitle(lastLevel)}，每天学习 ${dailyNewWordCount} 个内容。L0 从字母和拼读开始，后续等级再逐步进入词汇、句型和语境。</p>
        <div class="study-box">今日需要复习的旧内容：
${formatWords(reviewWords)}

艾宾浩斯复习节奏：
第 2 天、第 3 天、第 5 天、第 8 天、第 16 天、第 31 天复习之前学过的内容。</div>
        <label>选择今天的新学习内容来源：</label>
        <div class="options">
          <button onclick="useSystemWords()">A. 使用系统推荐：${systemWords.join("、")}</button>
          <button onclick="document.getElementById('customArea').style.display = 'block'">B. 自己设置学习内容</button>
        </div>
        <div id="customArea" style="display:none">
          <label for="customWords">请输入今天要学的内容，最多 20 个：</label>
          <textarea id="customWords" placeholder="例如：ก&#10;า&#10;มา"></textarea>
          <button class="primary" onclick="useCustomWords()">保存自己设置的内容</button>
          <div class="error" id="wordError"></div>
        </div>
        ${messageHtml}
        <div class="error" id="wordPlanError"></div>
        <button class="primary" onclick="showWordBooksPage()">浏览泰语词库</button>
        <button class="primary" onclick="showStartPage()">返回测试</button>
      `;
    }

    function showResultPage() {
      const accuracy = correctCount / activeQuestions.length * 100;
      const averageTime = answerTimes.reduce((a, b) => a + b, 0) / answerTimes.length;
      const level = getLevel(accuracy);
      const weakTypes = getWeakTypes();
      const weakText = weakTypes.length > 0 ? weakTypes.join("、") : "暂无";
      const suggestion = getSuggestion(level, weakTypes);
      const dailyWordPlan = getDailyWordPlan(level);
      const levelTitle = getLevelTitle(level);
      lastLevel = level;

      app.innerHTML = `
        <h1>测试结果</h1>
        <div class="result">登录邮箱：${loginEmail}
泰语名字：${userName}
性别：${gender}
用户等级：${levelTitle}
正确率：${accuracy.toFixed(1)}%
平均答题时间：${averageTime.toFixed(1)} 秒
薄弱题型：${weakText}
每日学习计划：${dailyWordPlan}

按等级推荐：
${suggestion}</div>
        <button class="primary" onclick="showWordPlanPage()">生成今日泰语学习计划</button>
        <button class="primary" onclick="showWordBooksPage()">浏览泰语词库</button>
        <button class="primary" onclick="showStartPage()">重新测试</button>
      `;

      saveTestResult({
        user_id: currentUserId,
        email: loginEmail,
        thai_name: userName,
        gender: gender,
        studied_thai: studiedThai,
        level: level,
        level_title: levelTitle,
        accuracy: Number(accuracy.toFixed(1)),
        average_time: Number(averageTime.toFixed(1)),
        weak_types: weakTypes,
        correct_count: correctCount,
        total_questions: activeQuestions.length
      });
    }

    restoreLoginSession();
  </script>
</body>
</html>
